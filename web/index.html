<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Netlify Deployment</p>
        <h1>Ask Questions About PDF and DOCX Files</h1>
        <p class="lede">
          Upload a document, ask a question, and get an answer grounded in the
          extracted text.
        </p>
      </section>

      <section class="panel">
        <label class="field">
          <span>Document</span>
          <input id="file-input" type="file" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
        </label>

        <label class="field">
          <span>Question</span>
          <textarea id="question-input" rows="5" placeholder="What does this document say about..."></textarea>
        </label>

        <button id="ask-button" type="button">Ask</button>
        <p id="status" class="status"></p>
      </section>

      <section class="panel">
        <h2>Answer</h2>
        <div id="answer-output" class="answer">No answer yet.</div>
      </section>
    </main>

    <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <script type="module" src="/app.mjs"></script>
  </body>
</html>
