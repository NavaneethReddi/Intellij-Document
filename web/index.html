<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-bg">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="grid-glow"></div>
    </div>

    <main class="app-shell">

      <section class="workspace">
        <section class="panel composer reveal">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Input</p>
              <h2>Ask about a document</h2>
            </div>
            <span id="status-badge" class="status-badge">Idle</span>
          </div>

          <label id="dropzone" class="upload-zone" for="file-input">
            <input
              id="file-input"
              type="file"
              accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            />
            <span class="upload-icon">+</span>
            <span class="upload-title">Drop a file here or click to browse</span>
            <span class="upload-subtitle">Supports PDF and DOCX files</span>
            <span id="file-chip" class="file-chip">No file selected</span>
          </label>

          <label class="field">
            <span>Question</span>
            <textarea
              id="question-input"
              rows="6"
              placeholder="What does this document say about budget changes, deadlines, or major decisions?"
            ></textarea>
          </label>

          <div class="composer-actions">
            <button id="ask-button" type="button">
              <span class="button-text">Generate Answer</span>
              <span class="button-shine"></span>
            </button>
            <p id="status" class="status">Ready when you are.</p>
          </div>
        </section>

        <section class="panel answer-panel reveal">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Output</p>
              <h2>Answer</h2>
            </div>
            <span class="answer-tag">Live response</span>
          </div>

          <div class="answer-frame">
            <div class="answer-grid"></div>
            <div id="answer-output" class="answer">No answer yet.</div>
          </div>
        </section>
      </section>
    </main>

    <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
    <script type="module" src="/app.mjs"></script>
  </body>
</html>
